# Category 5 — SI-Methods references (best fit selected by team-lead)
# ───────────────────────────────────────────────────────
si_methods_refs:
  - bibtex_key: "Kall2007Phobius"
    citation: "Käll L, Krogh A, Sonnhammer ELL. (2007) Advantages of combined transmembrane topology and signal peptide prediction—the Phobius web server. Nucleic Acids Research 35(suppl_2):W429–W432. doi:10.1093/nar/gkm256"
    used_in_section: "SI-Methods §R1–R3 (signal peptide cleavage and transmembrane topology) — describes the optional triage backend."
  - bibtex_key: "Hallgren2022DeepTMHMM"
    citation: "Hallgren J, Tsirigos KD, Damgaard Pedersen M, Almagro Armenteros JJ, Marcatili P, Nielsen H, Krogh A, Winther O. (2022) DeepTMHMM predicts alpha and beta transmembrane proteins using deep neural networks. bioRxiv. doi:10.1101/2022.04.08.487609"
    used_in_section: "SI-Methods §R3 (default DeepTMHMM topology call); R5 functional class context."
  - bibtex_key: "Krell2011Diversity"
    citation: "Krell T, Lacal J, Muñoz-Martínez F, Reyes-Darias JA, Cadirci BH, García-Fontana C, Ramos JL. (2011) Diversity at a structural level: bacterial chemoreceptors detect ligands in different ways. Environmental Microbiology 13(7):1684–1690. doi:10.1111/j.1462-2920.2011.02493.x"
    used_in_section: "SI-Methods §R5 (functional class — MCP/CRP/SBP recognition); justifies the family-aware triage cutoffs and explains observed family bias of CNN ranking failures."
  - bibtex_key: "DrewBoudker2016Transporters"
    citation: "Drew D, Boudker O. (2016) Shared molecular mechanisms of membrane transporters. Annual Review of Biochemistry 85:543–572. doi:10.1146/annurev-biochem-060815-014520"
    used_in_section: "SI-Methods §R3–R4 (TM-rich transporters: dock-region extraction logic); SI-Notes §11.2 family-bias hypothesis (induced-fit)."
  - bibtex_key: "Briegel2014ChemoreceptorArchitecture"
    citation: "Briegel A, Ladinsky MS, Oikonomou C, Jones CW, Harris MJ, Fowler DJ, Chang Y-W, Thompson LK, Armitage JP, Jensen GJ. (2014) Structural conservation of chemotaxis machinery across Archaea and Bacteria. Environmental Microbiology Reports 6(2):116–122. doi:10.1111/1758-2229.12181"
    used_in_section: "SI-Methods §R5 (chemoreceptor cytoplasmic-domain conservation) and SI-Notes §11.2 family-bias rationale (MCP architecture)."

